server:
  port: 8080

spring:
  application:
    name: coexistree
  datasource:
    url: jdbc:h2:file:./data/h2/coexistree;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  file:
    name: ./data/logs/coexistree.log
  level:
    root: INFO
    io.github.xiaoailazy.coexistree: INFO

app:
  storage:
    doc-root: ./data/docs
    tree-root: ./data/trees
    system-tree-root: ./data/system-trees
  llm:
    api-key: ${LLM_API_KEY}
    default-model: ${LLM_MODEL}
    base-url: ${LLM_BASE_URL}
