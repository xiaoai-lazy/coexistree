# 生产环境配置
# 使用 H2 文件数据库，简单轻量

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: coexistree

  web:
    resources:
      static-locations: file:/app/static/,classpath:/static/

  datasource:
    url: ${DB_URL:jdbc:h2:file:${STORAGE_PATH:./data}/h2/coexistree;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-at-start: true
    validate-on-migrate: false

  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    io.github.xiaoailazy.coexistree: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:./data/logs}/coexistree.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB

app:
  storage:
    doc-root: ${STORAGE_PATH:./data}/docs
    tree-root: ${STORAGE_PATH:./data}/trees
    system-tree-root: ${STORAGE_PATH:./data}/system-trees

llm:
  openai:
    api-key: ${LLM_API_KEY}
    model: ${LLM_MODEL:gpt-4o-mini}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    temperature: 0.3
    max-tokens: 4096
    timeout: 60000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  issuer: CoExistree

admin:
  username: admin
  password: ${ADMIN_INITIAL_PASSWORD}
  display-name: 系统管理员

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
    metrics:
      access: read_only
  simple:
    metrics:
      export:
        enabled: false
