# 生产环境配置
# 使用 H2 文件数据库，简单轻量

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: coexistree

  datasource:
    url: ${DB_URL:jdbc:h2:file:${STORAGE_PATH:./data}/h2/coexistree;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    io.github.xiaoailazy.coexistree: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:./data/logs}/coexistree.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB

app:
  storage:
    doc-root: ${STORAGE_PATH:./data}/docs
    tree-root: ${STORAGE_PATH:./data}/trees
    system-tree-root: ${STORAGE_PATH:./data}/system-trees
  llm:
    api-key: ${LLM_API_KEY}
    default-model: ${LLM_MODEL}
    base-url: ${LLM_BASE_URL}
