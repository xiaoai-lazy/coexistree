spring:
  application:
    name: coexistree
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true  # 启用 Java 21 虚拟线程支持

# Google ADK Model Configuration
# Uses the same OpenAI-compatible endpoint as the existing LLM config.
# Can be overridden to use a different model for agents.
app:
  adk:
    model: ${llm.openai.model}
