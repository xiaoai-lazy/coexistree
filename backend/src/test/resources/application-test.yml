# Test profile configuration
# Uses in-memory H2 database for integration tests

server:
  port: 0  # Random port for parallel test execution

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  flyway:
    enabled: false  # Disable Flyway for tests to use ddl-auto
    validate-on-migrate: false

logging:
  level:
    root: WARN
    io.github.xiaoailazy.coexistree: INFO
    org.springframework.test: INFO
    org.hibernate.SQL: DEBUG

app:
  storage:
    doc-root: ./target/test-data/docs
    tree-root: ./target/test-data/trees
    system-tree-root: ./target/test-data/system-trees

llm:
  openai:
    api-key: ${LLM_API_KEY:test-api-key}
    model: ${LLM_MODEL:gpt-4o-mini}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    enabled: ${LLM_TEST_ENABLED:false}

jwt:
  secret: test-secret-key-that-is-long-enough-for-hs256-algorithm-at-least-32-bytes

admin:
  password: test-admin-password
